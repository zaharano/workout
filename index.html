<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werk Werk</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-main: #f0f0f0;
            --text-muted: #a0a0a0;
            --accent-work: #2978A0;
            --accent-rest: #4a4a4a;
            --accent-warmup: #D08770;
            --accent-cooldown: #A3BE8C;
            --surface-color: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        #app, #history-screen, #start-screen {
            width: 100%;
            max-width: 600px;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
            justify-content: center;
        }

        /* Status Bar */
        .status-bar {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Timer Circle */
        .timer-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto;
            border-radius: 50%;
            background: conic-gradient(var(--current-color) var(--progress), #333 0deg);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.1s linear;
        }

        .timer-inner {
            width: 230px;
            height: 230px;
            background-color: var(--bg-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .time-display {
            font-size: 5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        /* Text Content */
        .step-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.1;
        }

        .step-desc {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.4;
            min-height: 3.5em;
        }

        /* Controls */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            background-color: transparent;
            border: 2px solid var(--text-main);
            color: var(--text-main);
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-weight: 600;
        }

        button:hover {
            background-color: var(--text-main);
            color: var(--bg-color);
        }

        button:active {
            transform: scale(0.95);
        }

        button.secondary {
            border-color: var(--text-muted);
            color: var(--text-muted);
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        /* Up Next Indicator */
        .up-next {
            font-size: 0.9rem;
            color: var(--text-muted);
            opacity: 0.8;
            margin-top: 10px;
        }

        /* History List */
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            max-height: 50vh;
            text-align: left;
            border-top: 1px solid #333;
        }

        .history-item {
            padding: 15px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-date { font-weight: bold; }
        .history-time { color: var(--text-muted); font-size: 0.9rem; }

        /* Phase Colors */
        .phase-warmup .timer-container { --current-color: var(--accent-warmup); }
        .phase-work .timer-container { --current-color: var(--accent-work); }
        .phase-rest .timer-container { --current-color: var(--accent-rest); }
        .phase-cooldown .timer-container { --current-color: var(--accent-cooldown); }
        .phase-prepare .timer-container { --current-color: #2ecc71; }
        
        .hidden { display: none !important; }

    </style>
</head>

        <div class="controls">
            <button class="secondary" onclick="showHistory()">View History</button>

        <div class="up-next" id="up-next"></div>
    </div>

    <div id="history-screen" class="hidden">

        <div class="controls">

                { type: 'work', time: 30, title: "Hollow Body Hold", desc: "Press your low back into the floor, lift your shoulders and legs, and hold.", position: "On your back, arms reaching overhead" },
                { type: 'rest', time: 90, title: "Recovery", desc: "Round 1 complete. Catch your breath — Round 2 next." },

                // ROUND 2
                { type: 'work', time: 30, title: "Split Squat Isometric", desc: "Lower until both knees are ~90° and hold low, front shin vertical.", position: "Standing in a long split stance" },
                { type: 'rest', time: 60, title: "Rest", desc: "Breathe and reset. Next: Push-Up Isometric." },
                { type: 'work', time: 30, title: "Push-Up Isometric", desc: "Lower halfway down and hold there, elbows tucked, body in one straight line.", position: "In a high plank, hands under shoulders" },
                { type: 'rest', time: 60, title: "Rest", desc: "Breathe and reset. Next: Kickstand Deadlift & Reach." },
                { type: 'work', time: 30, title: "Kickstand Deadlift & Reach", desc: "Raise your arms by your ears, then hinge at the hips until your torso is near parallel to the floor. Hold there, spine long. Switch sides halfway.", position: "Standing, one foot back with heel raised, in a kickstand" },
                { type: 'rest', time: 60, title: "Rest", desc: "Breathe and reset. Next: Side Plank." },
                { type: 'work', time: 30, title: "Side Plank", desc: "Stack your hips and feet, lift into a straight line, and hold. Switch sides halfway.", position: "On your side, propped on one forearm" },
                { type: 'rest', time: 60, title: "Rest", desc: "Breathe and reset. Next: Hollow Body Hold." },
                { type: 'work', time: 30, title: "Hollow Body Hold", desc: "Press your low back into the floor, lift your shoulders and legs, and hold.", position: "On your back, arms reaching overhead" },
                { type: 'rest', time: 90, title: "Recovery", desc: "Round 2 complete. One round to go!" },

                // ROUND 3
                { type: 'work', time: 30, title: "Split Squat Isometric", desc: "Lower until both knees are ~90° and hold low, front shin vertical.", position: "Standing in a long split stance" },
                { type: 'rest', time: 60, title: "Rest", desc: "Breathe and reset. Next: Push-Up Isometric." },
                { type: 'work', time: 30, title: "Push-Up Isometric", desc: "Lower halfway down and hold there, elbows tucked, body in one straight line.", position: "In a high plank, hands under shoulders" },
                { type: 'rest', time: 60, title: "Rest", desc: "Breathe and reset. Next: Kickstand Deadlift & Reach." },
                { type: 'work', time: 30, title: "Kickstand Deadlift & Reach", desc: "Raise your arms by your ears, then hinge at the hips until your torso is near parallel to the floor. Hold there, spine long. Switch sides halfway.", position: "Standing, one foot back with heel raised, in a kickstand" },
                { type: 'rest', time: 60, title: "Rest", desc: "Breathe and reset. Next: Side Plank." },
                { type: 'work', time: 30, title: "Side Plank", desc: "Stack your hips and feet, lift into a straight line, and hold. Switch sides halfway.", position: "On your side, propped on one forearm" },
                { type: 'rest', time: 60, title: "Rest", desc: "Breathe and reset. Last exercise: Hollow Body Hold." },
                { type: 'work', time: 30, title: "Hollow Body Hold", desc: "Press your low back into the floor, lift your shoulders and legs, and hold.", position: "On your back, arms reaching overhead" },

                { type: 'cooldown', time: 0, title: "Workout Complete", desc: "Strong work! Session saved." }
            ]
        };

        // Display names for the start-screen buttons (keys can't hold spaces/casing).
        const workoutNames = {
            dynamicWarmup: "9-Min Dynamic Warm-Up",
            mobilityFlow: "10-Min Mobility Flow",
            beginnerStrength: "Beginner Strength"
        };

        // --- STATE ---
        let currentIndex = 0;
        let timeLeft = 0;
        let isPaused = false;
        let timerInterval = null;
        let currentRoutine = [];
        let wakeLock = null;

        // --- ELEMENTS ---
        const els = {
            startScreen: document.getElementById('start-screen'),
            app: document.getElementById('app'),
            historyScreen: document.getElementById('history-screen'),
            historyList: document.getElementById('history-list'),
            timer: document.getElementById('timer'),
            title: document.getElementById('title'),
            desc: document.getElementById('description'),
            btn: document.getElementById('toggle-btn'),
            homeBtn: document.getElementById('home-btn'),
            phase: document.getElementById('phase-display'),
            totalProgress: document.getElementById('total-progress'),
            timerRing: document.getElementById('timer-ring'),
            upNext: document.getElementById('up-next')
        };

        // --- NAVIGATION ---
        async function startWorkout(key) {
            const originalRoutine = workouts[key];
            currentRoutine = [];

            originalRoutine.forEach((step) => {
                if ((step.type === 'work' || step.type === 'warmup' || step.type === 'cooldown') && step.time > 0) {
                    currentRoutine.push({
                        type: 'prepare',
                        time: 5,
                        title: "GET READY",
                        desc: step.position
                            ? `Next up is... ${step.title}\nGet set: ${step.position}`
                            : `Next up is... ${step.title}`
                    });
                }
                currentRoutine.push(step);
            });

            currentIndex = 0; // Reset index
            showScreen('app');
            els.homeBtn.classList.add('hidden');
            els.btn.classList.remove('hidden');
            loadStep(currentIndex);
            startInterval();
            requestWakeLock();
        }

        function goHome() {
            stopInterval();
            releaseWakeLock();
            showScreen('start-screen');
        }

        function endWorkout() {
            if(confirm("Are you sure you want to end the workout?")) {
                goHome();
            }
        }

        function showHistory() {
            renderHistory();
            showScreen('history-screen');
        }

        function showScreen(id) {
            ['start-screen', 'app', 'history-screen'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        // --- WORKOUT LOGIC ---
        function loadStep(index) {
            const step = currentRoutine[index];
            timeLeft = step.time;
            
            els.title.innerText = step.title;
            els.desc.innerText = step.desc;
            els.timer.innerText = timeLeft;
            els.app.className = `phase-${step.type}`; 
            els.phase.innerText = step.type.toUpperCase();

            // Total Progress
            const totalSteps = currentRoutine.length;
            els.totalProgress.innerText = `${index + 1} / ${totalSteps}`;

            // Up Next Logic
            let nextIndex = index + 1;
            // Skip "prepare" steps for the "Up Next" preview at the bottom
            while (nextIndex < currentRoutine.length && currentRoutine[nextIndex].type === 'prepare') {
                nextIndex++;
            }

            if (nextIndex < currentRoutine.length) {
                els.upNext.innerText = `Up Next: ${currentRoutine[nextIndex].title}`;
            } else {
                els.upNext.innerText = "";
            }

            updateRing(100); 

            // FINISH STATE
            if (step.time === 0) {
                stopInterval();
                saveWorkoutLog(); // <--- AUTO SAVE HERE
                els.timer.innerText = "✓";
                els.btn.classList.add('hidden');
                els.homeBtn.classList.remove('hidden');
                updateRing(100);
            }
        }

        function startInterval() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused) tick();
            }, 1000);
        }

        function stopInterval() {
            if (timerInterval) clearInterval(timerInterval);
        }

        function tick() {
            if (timeLeft > 0) {
                timeLeft--;
                els.timer.innerText = timeLeft;
                const totalTime = currentRoutine[currentIndex].time;
                updateRing((timeLeft / totalTime) * 100);
            } else {
                currentIndex++;
                loadStep(currentIndex);
            }
        }

        function updateRing(percent) {
            els.timerRing.style.setProperty('--progress', `${percent}%`);
        }

        function togglePause() {
            isPaused = !isPaused;
            els.btn.innerText = isPaused ? "Resume" : "Pause";
            els.app.style.opacity = isPaused ? "0.5" : "1";
        }

        // --- LOCAL STORAGE LOGIC ---
        function saveWorkoutLog() {
            const now = new Date();
            const logEntry = {
                date: now.toLocaleDateString(),
                time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                timestamp: now.getTime()
            };

            let logs = JSON.parse(localStorage.getItem('workoutLogs') || '[]');
            logs.unshift(logEntry); // Add to top
            localStorage.setItem('workoutLogs', JSON.stringify(logs));
        }

        function renderHistory() {
            const logs = JSON.parse(localStorage.getItem('workoutLogs') || '[]');
            els.historyList.innerHTML = '';

            if (logs.length === 0) {
                els.historyList.innerHTML = '<li class="history-item" style="justify-content:center; color:#666;">No workouts yet</li>';
                return;
            }

            logs.forEach(log => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <span class="history-date">${log.date}</span>
                    <span class="history-time">${log.time}</span>
                `;
                els.historyList.appendChild(li);
            });
        }

        function clearHistory() {
            if(confirm("Clear all logs?")) {
                localStorage.removeItem('workoutLogs');
                renderHistory();
            }
        }

        // --- WAKE LOCK ---
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock was released');
                    });
                    console.log('Wake Lock is active');
                }
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        // --- INITIALIZATION ---
        function init() {
            const selectionDiv = document.getElementById('workout-selection');
            selectionDiv.innerHTML = '';

            Object.keys(workouts).forEach(key => {
                const btn = document.createElement('button');
                btn.innerText = workoutNames[key] || (key.charAt(0).toUpperCase() + key.slice(1));
                btn.onclick = () => startWorkout(key);
                btn.style.marginBottom = '10px';
                selectionDiv.appendChild(btn);
            });
        }

        init();
    </script>
</body>
</html>
